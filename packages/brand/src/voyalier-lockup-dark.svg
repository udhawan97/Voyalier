<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" style="--dur:7s" role="img" aria-labelledby="t d">
  <title id="t">Voyalier</title>
  <desc id="d">The Voyalier folded-route mark above the letterspaced wordmark.</desc>
  <style>
    .ink { fill: #f2ede1; }
    .fold { fill: #93a0b8; }
    .word { fill: #f2ede1; }
    /* Seamless one-cycle loop: ink traces the route, the traveler arrives,
       the paper exhales, then a long stillness. At rest (0%/100%) the mark is
       complete, so it also reads correctly frozen or under reduced motion. */
    .trace {
      fill: none; stroke: #c34e33; stroke-width: 1.6;
      stroke-linecap: round; stroke-linejoin: round;
      stroke-dasharray: 128; stroke-dashoffset: 128; opacity: 0;
      animation: voy-trace var(--dur) ease-in-out infinite;
    }
    .fold {
      transform-box: view-box; transform-origin: 50px 80px;
      animation: voy-breath var(--dur) ease-in-out infinite;
    }
    .dot {
      fill: #c34e33; transform-box: fill-box; transform-origin: center;
      animation: voy-arrive var(--dur) ease-in-out infinite;
    }
    .halo {
      fill: none; stroke: #c34e33; stroke-width: 1.2; opacity: 0;
      transform-box: fill-box; transform-origin: center;
      animation: voy-ping var(--dur) ease-in-out infinite;
    }
    .sheen { animation: voy-sheen var(--dur) ease-in-out infinite; }
    @keyframes voy-trace {
      0% { stroke-dashoffset: 128; opacity: 0; }
      5% { opacity: .85; }
      36% { stroke-dashoffset: 0; opacity: .85; }
      52% { stroke-dashoffset: 0; opacity: 0; }
      56%, 100% { stroke-dashoffset: 128; opacity: 0; }
    }
    @keyframes voy-breath {
      0%, 36%, 74%, 100% { transform: skewX(0) scaleY(1); }
      54% { transform: skewX(-1.8deg) scaleY(.986); }
    }
    @keyframes voy-arrive {
      0%, 33% { transform: scale(1); }
      41% { transform: scale(1.16); }
      50%, 100% { transform: scale(1); }
    }
    @keyframes voy-ping {
      0%, 35% { transform: scale(.5); opacity: 0; }
      42% { transform: scale(1); opacity: .5; }
      60% { transform: scale(2); opacity: 0; }
      61%, 100% { transform: scale(.5); opacity: 0; }
    }
    @keyframes voy-sheen {
      0%, 55% { transform: translateX(0); }
      82%, 100% { transform: translateX(160px); }
    }
    @media (prefers-reduced-motion: reduce) {
      .trace, .fold, .dot, .halo, .sheen { animation: none; }
    }
  </style>
  <svg x="100" y="8" width="120" height="120" viewBox="0 0 96 96" overflow="visible">
    <polygon class="ink" points="22,18 38,18 58,80 42,80"/>
    <polygon class="fold" points="42,80 58,80 73.5,32 57.5,32"/>
    <polyline class="trace" points="30,18 50,80 69,21"/>
    <circle class="halo" cx="69" cy="21" r="5"/>
    <circle class="dot" cx="69" cy="21" r="5"/>
    <defs>
      <linearGradient id="shg" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
        <stop offset=".5" stop-color="#ffffff" stop-opacity=".3"/>
        <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
      </linearGradient>
      <clipPath id="shc">
        <polygon points="22,18 38,18 58,80 42,80"/>
        <polygon points="42,80 58,80 73.5,32 57.5,32"/>
        <circle cx="69" cy="21" r="5"/>
      </clipPath>
    </defs>
    <g clip-path="url(#shc)"><g transform="rotate(20 48 48)"><rect class="sheen" x="-40" y="-40" width="34" height="176" fill="url(#shg)"/></g></g>
  </svg>
