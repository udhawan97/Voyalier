    <path transform="translate(127.429 178.0) scale(0.02200 -0.02200)" d="M258 0V298L24 700H130L305 398L478 700H585L351 298V0Z"/>
    <path transform="translate(148.285 178.0) scale(0.02200 -0.02200)" d="M14 0 287 700H368L641 0H538L471 179H182L115 0ZM213 265H440L328 569Z"/>
