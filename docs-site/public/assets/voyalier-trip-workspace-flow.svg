<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">How the Voyalier trip workspace works</title>
  <desc id="desc">A traveler-facing workflow diagram showing a trip moving from setup through evidence gathering, review, deterministic planning, offline preparation, travel-day use, and redacted sharing.</desc>
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse"><path d="M32 0H0V32" fill="none" stroke="#faf7ef" stroke-opacity=".045"/></pattern>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="160%"><feDropShadow dx="0" dy="9" stdDeviation="12" flood-color="#000" flood-opacity=".2"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0l10 5-10 5z" fill="#93a0b8"/></marker>
    <style>
      .sans{font-family:"Zen Kaku Gothic New",Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.serif{font-family:"Shippori Mincho","Iowan Old Style",Georgia,serif}.title{font-size:31px;font-weight:600;fill:#f2ede1}.subtitle{font-size:15px;fill:#a9a69c}.eyebrow{font-size:11px;font-weight:700;letter-spacing:2.3px;fill:#d97a5f}.num{font-size:12px;font-weight:800;fill:#fff}.card-title{font-size:18px;font-weight:750;fill:#1a1917}.copy{font-size:13px;fill:#5f5b52}.small{font-size:11px;fill:#5f5b52}.pill{font-size:10px;font-weight:700;letter-spacing:.4px;fill:#46536b}.flow{fill:none;stroke:#93a0b8;stroke-width:2;marker-end:url(#arrow)}
    </style>
  </defs>

  <rect width="1400" height="820" rx="24" fill="#171614"/>
  <rect width="1400" height="820" rx="24" fill="url(#grid)"/>
  <text x="56" y="60" class="sans eyebrow">PRODUCT FLOW · ONE TRIP, FOLDED INTO A WORKSPACE</text>
  <text x="56" y="101" class="serif title">The app stays useful before, during, and without a network</text>
  <text x="56" y="129" class="sans subtitle">Each stage adds evidence or derives a view; none hands booking, safety, or entry authority to a model.</text>

  <!-- route -->
  <path d="M160 302C294 230 400 230 524 302s242 72 366 0 244-72 350 0" fill="none" stroke="#46536b" stroke-width="4" stroke-linecap="round"/>
  <path d="M1240 302c38 27 58 62 58 105 0 67-53 104-108 125" class="flow"/>

  <!-- top cards -->
  <g filter="url(#shadow)">
    <rect x="56" y="182" width="218" height="218" rx="20" fill="#faf7ef"/>
    <circle cx="88" cy="214" r="16" fill="#c34e33"/><text x="88" y="219" class="sans num" text-anchor="middle">01</text>
    <text x="116" y="220" class="sans card-title">Frame the trip</text>
    <text x="80" y="258" class="sans copy">Set origin, destination,</text><text x="80" y="278" class="sans copy">dates, and working title.</text>
    <rect x="80" y="302" width="170" height="30" rx="10" fill="#ebe6d7"/><text x="165" y="322" class="sans pill" text-anchor="middle">DETERMINISTIC BLUEPRINT</text>
    <text x="80" y="356" class="sans small">Missing logistics become actions,</text><text x="80" y="374" class="sans small">not invented recommendations.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="316" y="214" width="218" height="218" rx="20" fill="#faf7ef"/>
    <circle cx="348" cy="246" r="16" fill="#c34e33"/><text x="348" y="251" class="sans num" text-anchor="middle">02</text>
    <text x="376" y="252" class="sans card-title">Gather evidence</text>
    <text x="340" y="290" class="sans copy">Paste confirmations; fetch</text><text x="340" y="310" class="sans copy">official advice or weather.</text>
    <rect x="340" y="334" width="170" height="30" rx="10" fill="#ebe6d7"/><text x="425" y="354" class="sans pill" text-anchor="middle">CONSENT FOR NETWORK</text>
    <text x="340" y="388" class="sans small">Sources keep URL, time, license,</text><text x="340" y="406" class="sans small">coverage, and freshness.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="576" y="182" width="218" height="218" rx="20" fill="#faf7ef"/>
    <circle cx="608" cy="214" r="16" fill="#c34e33"/><text x="608" y="219" class="sans num" text-anchor="middle">03</text>
    <text x="636" y="220" class="sans card-title">Review the facts</text>
    <text x="600" y="258" class="sans copy">Compare extracted fields</text><text x="600" y="278" class="sans copy">with source excerpts.</text>
    <rect x="600" y="302" width="170" height="30" rx="10" fill="#c34e33"/><text x="685" y="322" class="sans" font-size="10" font-weight="700" text-anchor="middle" fill="#fff">CONFIRM · FIX · REJECT</text>
    <text x="600" y="356" class="sans small">Warnings stay visible; undo sends</text><text x="600" y="374" class="sans small">a fact back to pending review.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="836" y="214" width="218" height="218" rx="20" fill="#faf7ef"/>
    <circle cx="868" cy="246" r="16" fill="#c34e33"/><text x="868" y="251" class="sans num" text-anchor="middle">04</text>
    <text x="896" y="252" class="sans card-title">Pressure-test it</text>
    <text x="860" y="290" class="sans copy">Check flight overlaps, hotel</text><text x="860" y="310" class="sans copy">gaps, and pending review.</text>
    <rect x="860" y="334" width="170" height="30" rx="10" fill="#ebe6d7"/><text x="945" y="354" class="sans pill" text-anchor="middle">READINESS IS EXPLAINED</text>
    <text x="860" y="388" class="sans small">Official sources inform; they do</text><text x="860" y="406" class="sans small">not guarantee or “clear” travel.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1096" y="182" width="248" height="218" rx="20" fill="#faf7ef"/>
    <circle cx="1128" cy="214" r="16" fill="#c34e33"/><text x="1128" y="219" class="sans num" text-anchor="middle">05</text>
    <text x="1156" y="220" class="sans card-title">Pack for offline</text>
    <text x="1120" y="258" class="sans copy">Download a city pack and keep</text><text x="1120" y="278" class="sans copy">the plan available on-device.</text>
    <rect x="1120" y="302" width="198" height="30" rx="10" fill="#ebe6d7"/><text x="1219" y="322" class="sans pill" text-anchor="middle">PLACES · ATTRIBUTION · MAP</text>
    <text x="1120" y="356" class="sans small">Persona weights rank local pack</text><text x="1120" y="374" class="sans small">data with visible “because” reasons.</text>
  </g>

  <!-- lower phase -->
  <g filter="url(#shadow)">
    <rect x="158" y="520" width="330" height="184" rx="20" fill="#f3efe4"/>
    <circle cx="190" cy="552" r="16" fill="#c34e33"/><text x="190" y="557" class="sans num" text-anchor="middle">06</text>
    <text x="218" y="558" class="sans card-title">Use the Today view</text>
    <text x="182" y="596" class="sans copy">A stable, offline timeline answers:</text>
    <text x="182" y="622" class="sans" font-size="13" font-weight="700" fill="#46536b">What is happening now?</text>
    <text x="182" y="645" class="sans" font-size="13" font-weight="700" fill="#46536b">What happens next?</text>
    <text x="182" y="680" class="sans small">Derived only from confirmed facts + date.</text>
  </g>

  <path d="M488 612h80" class="flow"/>

  <g filter="url(#shadow)">
    <rect x="570" y="520" width="330" height="184" rx="20" fill="#f3efe4"/>
    <circle cx="602" cy="552" r="16" fill="#c34e33"/><text x="602" y="557" class="sans num" text-anchor="middle">07</text>
    <text x="630" y="558" class="sans card-title">Ask for optional assist</text>
    <text x="594" y="596" class="sans copy">Preview the exact redacted payload,</text>
    <text x="594" y="616" class="sans copy">then choose on-device or BYOK cloud.</text>
    <rect x="594" y="640" width="282" height="28" rx="9" fill="#ebe6d7"/>
    <text x="735" y="659" class="sans pill" text-anchor="middle">OLLAMA · OPENAI · ANTHROPIC</text>
    <text x="594" y="688" class="sans small">The answer is assistance, never authority.</text>
  </g>

  <path d="M900 612h80" class="flow"/>

  <g filter="url(#shadow)">
    <rect x="982" y="520" width="260" height="184" rx="20" fill="#46536b"/>
    <circle cx="1014" cy="552" r="16" fill="#c34e33"/><text x="1014" y="557" class="sans num" text-anchor="middle">08</text>
    <text x="1042" y="558" class="sans" font-size="18" font-weight="750" fill="#f2ede1">Share deliberately</text>
    <text x="1006" y="596" class="sans" font-size="13" fill="#d7dce7">Generate a printable brief with a</text>
    <text x="1006" y="616" class="sans" font-size="13" fill="#d7dce7">redaction policy and preview.</text>
    <rect x="1006" y="640" width="212" height="28" rx="9" fill="#1a1917"/>
    <text x="1112" y="659" class="sans" font-size="10" font-weight="700" text-anchor="middle" fill="#f2ede1">NO RAW DOCUMENT CONTENT</text>
    <text x="1006" y="688" class="sans" font-size="11" fill="#c8c3b8">Print-to-PDF reuses tested local paths.</text>
  </g>

  <rect x="56" y="753" width="1288" height="38" rx="19" fill="#1e1c19" stroke="#46536b"/>
  <text x="700" y="777" class="sans" font-size="12" text-anchor="middle" fill="#a9a69c">OFFLINE BASELINE  ·  trip CRUD + confirmed facts + Blueprint + conflicts + readiness + search + Today + brief remain useful without AI or a live source</text>
  <circle cx="56" cy="772" r="7" fill="#c34e33"/>
</svg>
