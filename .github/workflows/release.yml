name: Release

# Builds the signed desktop bundles + updater artifacts (createUpdaterArtifacts
# is set in tauri.conf.json) and drafts a GitHub release. On a v* tag it creates
# the draft; on workflow_dispatch it is a build-only dry-run (empty tagName, no
# uploads). Hardened per docs/architecture/UPDATES.md §4.
#
# OWNER prerequisites before a real release can succeed:
#   - Configure a protected "release" environment (required reviewers) so the
#     signing key is only exposed to an approved run.
#   - Set secrets TAURI_SIGNING_PRIVATE_KEY(_PASSWORD) (see
#     docs/security/UPDATE_KEY_RUNBOOK.md) and replace the placeholder pubkey.
#   - Protect v* tags (block force-push/moves) so no write token can mint a
#     signed build.
#   - Run a workflow_dispatch dry-run and confirm the artifacts before tagging.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write # provenance attestation
  attestations: write

jobs:
  desktop:
    name: Desktop build (${{ matrix.artifact }})
    # Only a real tag build enters the protected environment (approval + the
    # signing secrets). A workflow_dispatch build gets no environment, no key,
    # and no updater artifacts — so an actor can't dispatch a malicious ref and
    # have a reviewer's "dry-run" approval sign it. Owner: scope the signing
    # secrets to the `release` environment (not repo-wide) to close this fully.
    environment: ${{ startsWith(github.ref, 'refs/tags/v') && 'release' || '' }}
    strategy:
      fail-fast: false
      # Serialize the two legs: tauri-action read-modify-writes the shared
      # latest.json to merge per-platform keys, and parallel legs would race
      # (last writer wins → only one of darwin-aarch64 / windows-x86_64 survives,
      # so half the fleet can't update). D4 requires BOTH keys.
      max-parallel: 1
      matrix:
        include:
          # macOS Apple Silicon (aarch64) — the ARM runner builds it natively
          # (owner decision D4: aarch64 only, not a universal binary).
          - platform: macos-latest
            artifact: macos
            attest: |
              target/release/bundle/macos/*.app.tar.gz
              target/release/bundle/dmg/*.dmg
          - platform: windows-latest
            artifact: windows
            attest: |
              target/release/bundle/nsis/*-setup.exe
              target/release/bundle/msi/*.msi
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      # A tagged release must not ship with an unreplaced updater pubkey — the
      # result is a broken updater (installs that can never verify). Only guard
      # real releases; workflow_dispatch stays a build-only dry-run.
      - name: Fail if the updater pubkey is still the placeholder
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          conf=apps/desktop/src-tauri/tauri.conf.json
          if grep -q "REPLACE_WITH_TAURI_SIGNER_GENERATE_PUBKEY" "$conf" \
            || grep -qE '"pubkey"[[:space:]]*:[[:space:]]*""' "$conf"; then
            echo "::error::plugins.updater.pubkey is the placeholder or empty — generate the real key (docs/security/UPDATE_KEY_RUNBOOK.md) and set the signing secrets before releasing." >&2
            exit 1
          fi
      - uses: pnpm/action-setup@b0f76dfb45f55f8421693e4803ac7bb65143bd34 # v6
        with:
          version: 11.7.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm
      # Pinned to a specific commit of the `stable` branch: a moving branch ref
      # would let a tag/branch move run arbitrary code in the job that holds the
      # signing key.
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      # NOTE: Swatinem/rust-cache is deliberately NOT used in the release job —
      # a poisoned target/ cache could run build.rs with the signing key in env.
      # The release job builds clean.
      - run: pnpm install --frozen-lockfile
      - name: Build, sign, and draft the release
        uses: tauri-apps/tauri-action@944946e3e4cac6603d1fe8f514171e9ecd3c78aa # v1
        env:
          # Step-scoped so no OTHER step (checkout, checksum, attest) can read
          # the key. Note: `cargo build` runs INSIDE this step, so a dependency's
          # build.rs still sees the key — that risk is mitigated by SHA-pinning +
          # --frozen-lockfile + the dropped cache above, not by this scoping.
          # Also tag-gated: a workflow_dispatch build never receives the key.
          TAURI_SIGNING_PRIVATE_KEY: ${{ startsWith(github.ref, 'refs/tags/v') && secrets.TAURI_SIGNING_PRIVATE_KEY || '' }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ startsWith(github.ref, 'refs/tags/v') && secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || '' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          # On a tag, build normally (updater artifacts need the signing key). On
          # a keyless dispatch dry-run, disable updater artifacts so the build
          # still succeeds as a smoke test without a key.
          args: ${{ startsWith(github.ref, 'refs/tags/v') && '--verbose' || '--verbose --config {"bundle":{"createUpdaterArtifacts":false}}' }}
          # On a tag: create a DRAFT release and upload the signed bundles, the
          # updater .sig files, and latest.json. On workflow_dispatch the empty
          # tagName makes it a build-only dry-run (no uploads).
          tagName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/v') && format('Voyalier {0}', github.ref_name) || '' }}
          releaseDraft: true
          prerelease: false
          # We want NSIS (not MSI) as the promoted updatable Windows artifact.
          updaterJsonPreferNsis: true
      - name: Attest build provenance
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661 # v3
        with:
          subject-path: ${{ matrix.attest }}
      - name: Checksums (attach to the draft)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          checksum="target/release/bundle/SHA256SUMS-${{ matrix.artifact }}.txt"
          # Node is already installed and behaves identically on macOS and
          # Windows. Git Bash on the Windows runner does not provide `shasum`.
          node scripts/write-release-checksums.mjs target/release/bundle "$checksum"
          gh release upload "${{ github.ref_name }}" "$checksum" --clobber
