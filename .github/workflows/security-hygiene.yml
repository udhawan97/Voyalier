name: Security hygiene

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "41 7 * * 2"

permissions:
  contents: read
  checks: write
  # rustsec/audit-check opens or refreshes a deduplicated tracking issue when
  # the advisory database reports informational warnings. Keep this workflow's
  # only repository write permission scoped to issues.
  issues: write

jobs:
  dependencies-and-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 11.7.0
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Audit production JavaScript dependencies
        run: pnpm audit --prod --audit-level high
      - name: Reject credential-shaped committed strings
        shell: bash
        run: |
          set -euo pipefail
          if git grep -nE '(sk-ant-[A-Za-z0-9_-]{20,}|sk-proj-[A-Za-z0-9_-]{20,}|gh[opsu]_[A-Za-z0-9]{30,})' -- ':!*.md' ':!.github/workflows/security-hygiene.yml'; then
            echo "Credential-shaped string found in tracked content." >&2
            exit 1
          fi
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - name: Verify the committed Rust lockfile
        run: cargo metadata --locked --no-deps --format-version 1 > /dev/null
      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
