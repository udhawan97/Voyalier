name: Build city packs

# Builds each city pack's contents (Overture places + Wikivoyage prose) from the
# catalog defined in voyalier-core and publishes them as JSON assets on the
# `packs-v1` release, which the app downloads per trip with consent.
#
# Manual only: the underlying data changes slowly and a build hits external
# services (the Overture S3 bucket and the Wikivoyage API), so it should be run
# deliberately rather than on every push.

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish pack assets to
        default: packs-v1
        type: string
      overture_release:
        description: Overture Maps release to query
        default: "2025-01-22.0"
        type: string
      protomaps_build:
        description: Exact Protomaps planet build date (YYYYMMDD)
        default: "20260715"
        type: string
      offline_map_pack_id:
        description: One catalog pack to receive an offline PMTiles basemap
        default: us-nashville
        type: string

permissions:
  contents: write # create/update the release and upload assets

concurrency:
  group: build-packs
  cancel-in-progress: true

jobs:
  build:
    name: Build and publish packs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24

      - name: Install DuckDB
        run: |
          curl -fsSL https://install.duckdb.org | sh
          echo "$HOME/.duckdb/cli/latest" >> "$GITHUB_PATH"

      - name: Dump the pack catalog (single source of truth)
        run: cargo run --locked -p voyalier-core --example pack_catalog > catalog.json

      - name: Build pack contents
        env:
          PACK_RELEASE_TAG: ${{ inputs.release_tag }}
          OVERTURE_RELEASE: ${{ inputs.overture_release }}
        run: node scripts/build-packs.mjs catalog.json

      - name: Install pinned PMTiles CLI
        shell: bash
        run: |
          set -euo pipefail
          archive="$RUNNER_TEMP/go-pmtiles.tar.gz"
          curl -fsSL \
            https://github.com/protomaps/go-pmtiles/releases/download/v1.30.0/go-pmtiles_1.30.0_Linux_x86_64.tar.gz \
            -o "$archive"
          echo "429dfa99b6f76fa116b2299a9466bb3811d59aaf1c36c216a41829a2696bee3b  $archive" \
            | sha256sum --check --strict
          mkdir -p "$RUNNER_TEMP/pmtiles"
          tar -xzf "$archive" -C "$RUNNER_TEMP/pmtiles"
          echo "$RUNNER_TEMP/pmtiles" >> "$GITHUB_PATH"

      - name: Build and verify one offline basemap slice
        env:
          OFFLINE_MAP_PACK_ID: ${{ inputs.offline_map_pack_id }}
          PROTOMAPS_BUILD: ${{ inputs.protomaps_build }}
        run: node scripts/build-offline-map.mjs catalog.json

      - name: Publish pack assets to the release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" \
              --prerelease \
              --title "City packs ($RELEASE_TAG)" \
              --notes "Overture places (CDLA-Permissive-2.0) + Wikivoyage prose (CC BY-SA 3.0), per pack. Built by .github/workflows/packs.yml."
          fi
          # BLOCKER fix (UPDATES.md §5): pack releases MUST be pre-release so
          # GitHub's releases/latest — which excludes pre-releases — never flips
          # to a pack release and 404s the in-app updater's latest.json. Enforced
          # even for a pre-existing release so it can't regress.
          gh release edit "$RELEASE_TAG" --prerelease
          gh release upload "$RELEASE_TAG" dist/packs/*.json dist/packs/*.pmtiles --clobber

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: city-packs
          path: dist/packs/
